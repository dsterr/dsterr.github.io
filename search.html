---
layout: default
title: Search
---

<h1>Search</h1>

<!-- Search box -->
<input type="text" id="search-box" placeholder="Search…" style="
  width: 100%;
  padding: 0.75rem 1rem;
  font-size: 1rem;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  margin-bottom: 1.5rem;
">

<!-- Results container -->
<div id="search-results"></div>

<!-- Lunr.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>

<script>
  // Fetch the JSON index
  fetch('/search.json')
    .then(response => response.json())
    .then(documents => {

      // Build Lunr index
      const idx = lunr(function () {
        this.ref('url');
        this.field('title');
        this.field('content');

        documents.forEach(doc => this.add(doc));
      });

      const searchBox = document.getElementById('search-box');
      const resultsDiv = document.getElementById('search-results');

      // -----------------------------
      // Auto-populate from ?q=...
      // -----------------------------
      const params = new URLSearchParams(window.location.search);
      const initialQuery = params.get("q");

      if (initialQuery) {
        searchBox.value = initialQuery;
        runSearch(initialQuery);
      }

      // -----------------------------
      // Live search as user types
      // -----------------------------
      searchBox.addEventListener('input', () => {
        const query = searchBox.value.trim();
        runSearch(query);
      });

      // -----------------------------
      // Search function
      // -----------------------------
      function runSearch(query) {
        if (!query) {
          resultsDiv.innerHTML = '';
          return;
        }
      
        const results = idx.search(query);
      
        if (results.length === 0) {
          resultsDiv.innerHTML = `
            <div class="card" style="padding:1.25rem; margin-top:1rem;">
              <p style="margin:0; color:var(--muted);">
                No results found for "<strong>${query}</strong>".
              </p>
            </div>
          `;
          return;
        }
      
        resultsDiv.innerHTML = results.map(result => {
          const item = documents.find(d => d.url === result.ref);
      
          return `
            <a href="${item.url}" class="card activity-link" style="margin-bottom:1rem; display:block;">
              <h3>${item.title}</h3>
              <p>${item.content.substring(0, 150)}...</p>
            </a>
          `;
        }).join('');
      }
</script>
