<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>

<body>

  <header>
    {% include header.html %}
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    {% include footer.html %}
  </footer>

  <!-- YEAR SCRIPT -->
  <script>
    const year = document.getElementById("year");
    if (year) year.textContent = new Date().getFullYear();
  </script>
  
  <!-- GTRANSLATE SETTINGS -->
  <script>
    window.gtranslateSettings = {
      default_language: "en",
      native_language_names: true,
      detect_browser_language: false,
      wrapper_selector: ".gtranslate_wrapper"
    };
  </script>
  
  <!-- GTRANSLATE ENGINE -->
  <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>
  
  <!-- REQUIRED WRAPPER -->
  <div class="gtranslate_wrapper" style="display:none;"></div>
  
  <!-- CUSTOM LANGUAGE SWITCHER -->
  <script>
    document.querySelectorAll('.gtranslate').forEach(el => {
      el.addEventListener('click', function(e) {
        e.preventDefault();
        const langPair = this.getAttribute('data-lang');
        window.GTranslateTranslate(langPair);
      });
    });
  </script>

</body>
</html>
