<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  {% include head.html %}
</head>

<body>

  <header>
    {% include header.html %}
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    {% include footer.html %}
  </footer>

  <!-- YEAR SCRIPT -->
  <script>
    const year = document.getElementById("year");
    if (year) year.textContent = new Date().getFullYear();
  </script>
  
  <!-- GTRANSLATE SETTINGS -->
  <script>
    window.gtranslateSettings = {
      default_language: "en",
      native_language_names: true,
      detect_browser_language: false,
      wrapper_selector: ".gtranslate_wrapper"
    };
  </script>
  
  <!-- GTRANSLATE ENGINE -->
  <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>
  
  <!-- REQUIRED WRAPPER -->
  <div class="gtranslate_wrapper" style="display:none;"></div>
  
  <!-- CUSTOM LANGUAGE SWITCHER -->
  <script>
    document.querySelectorAll('.gtranslate').forEach(el => {
      el.addEventListener('click', function(e) {
        e.preventDefault();
        const langPair = this.getAttribute('data-lang');
        window.GTranslateTranslate(langPair);
      });
    });
  </script>

  <!-- Light/Dark Mode -->
  <script>
      const toggle = document.getElementById('theme-toggle');
      const root = document.documentElement;
    
      // Load saved theme
      const saved = localStorage.getItem('theme');
      if (saved) {
        root.setAttribute('data-theme', saved);
        toggle.textContent = saved === 'dark'
          ? 'Switch to Light Mode'
          : 'Switch to Dark Mode';
      }
    
      toggle.addEventListener('click', () => {
        const current = root.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
    
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    
        toggle.textContent = next === 'dark'
          ? 'Switch to Light Mode'
          : 'Switch to Dark Mode';
      });
    </script>


</body>
</html>
