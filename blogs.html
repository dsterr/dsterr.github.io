---
title: Blogs
---
<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>

<body>
  <header>
    {% include header.html %}
  </header>

<main>
  <h1>Blogs</h1>
  <p>Browse all blog posts below. New posts appear automatically.</p>

  <div class="cards">

    {% for post in site.posts %}
      <div class="card">
        <h3>{{ post.title }}</h3>
        <p>{{ post.excerpt | strip_html | truncate: 120 }}</p>
        <p><a href="{{ post.url }}">Read more →</a></p>
      </div>
    {% endfor %}

  </div>
</main>

  <footer>
    {% include footer.html %}
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
