    :root {
      --bg: #f5f5f7;

      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);

    }

    header {
      background: var(--card);

      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .site-title {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
    }

    .site-subtitle {

      color: var(--muted);
    }

    nav a {
      margin-left: 1rem;
      text-decoration: none;
      color: var(--fg);
      font-weight: 500;
      transition: color 0.15s;
    }

    nav a:hover {
      color: var(--accent);
    }

      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem 3rem;
    }

    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

      margin-bottom: 1rem;
