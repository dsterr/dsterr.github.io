  <meta charset="UTF-8" />
  <title>About • My Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="About this website" />

  <style>
    :root {
      --bg: #f5f5f7;
      --fg: #111827;
      --accent: #2563eb;
      --card: #ffffff;
      --muted: #6b7280;
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .site-title {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
    }

    .site-subtitle {
      margin: 0.15rem 0 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    nav a {
      margin-left: 1rem;
      text-decoration: none;
      color: var(--fg);
      font-weight: 500;
      transition: color 0.15s;
    }

    nav a:hover {
      color: var(--accent);
    }

    main {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem 3rem;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2rem 1.75rem;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: var(--muted);
      margin-bottom: 1rem;
    }

    footer {
      border-top: 1px solid #e5e7eb;
      padding: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      background: #f9fafb;
    }

        /* Dropdown container */
    .dropdown {
      position: relative;
      display: inline-block;
    }
    
    /* Dropdown button */
    .dropbtn {
      margin-left: 1rem;
      text-decoration: none;
      color: var(--fg);
      font-weight: 500;
      cursor: pointer;
    }
    
    /* Dropdown menu (hidden by default) */
    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;          /* Align the menu to the right edge */
      left: auto;        /* Prevent left alignment */
      background: var(--card);
      min-width: 180px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.15);
      border-radius: var(--radius);
      padding: 0.5rem 0;
      z-index: 20;
    }
    
    /* Dropdown links */
    .dropdown-content a {
      display: block;
      padding: 0.6rem 1rem;
      text-decoration: none;
      color: var(--fg);
      font-size: 0.95rem;
    }
    
    .dropdown-content a:hover {
      background: #f3f4f6;
      color: var(--accent);
    }
    
    /* Show dropdown on hover */
    .dropdown:hover .dropdown-content {
      display: block;
    }
    
    /* Highlight Blogs link on hover */
    .dropdown:hover .dropbtn {
      color: var(--accent);
    }

  </style>
